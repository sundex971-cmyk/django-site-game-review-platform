{% extends 'layout/base.html' %}

{% block content %}

<div class="auth-container">

    <form method="POST" class="auth-form">

        {% csrf_token %}

        <h1>Login</h1>

        <div class="form-group">
            {{ form.username.label_tag }}
            {{ form.username }}
        </div>

        <div class="form-group">
            {{ form.password.label_tag }}
            {{ form.password }}
        </div>

        <button type="submit">
            Login
        </button>

    </form>

</div>

{% endblock %}
